<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600&display=swap" rel="stylesheet">

<style>

body{

margin:0;
background:#C48A5A;
font-family:'Baloo 2';

}

.screen{

width:100vw;
max-width:520px;
height:100vh;

background:#E8E2CC;

margin:auto;

border-radius:30px;

position:relative;

overflow:hidden;

display:none;

}

#menu{

display:block;

text-align:center;

padding-top:80px;

}

button{

background:#6FB072;

color:white;

border:none;

padding:15px;

margin:10px;

font-size:22px;

border-radius:15px;

cursor:pointer;

width:200px;

}

.stage{

position:absolute;

top:120px;

height:55%;

width:100%;

}

.egg{

position:absolute;

border-radius:50%;

cursor:pointer;

transition:.12s;

display:flex;

align-items:center;

justify-content:center;

font-size:40px;

color:white;

font-weight:bold;

}

.egg:active{

transform:scale(1.1);

}

.chickens{

position:absolute;

bottom:80px;

width:100%;

display:flex;

justify-content:space-around;

font-size:30px;

}

.target{

width:70px;
height:70px;

border-radius:50%;

display:flex;

align-items:center;

justify-content:center;

color:white;

font-size:32px;

}

.controls{

position:absolute;

bottom:10px;

width:100%;

text-align:center;

}

</style>

</head>

<body>

<div id="menu" class="screen">

<h1>JUEGOS</h1>

<button onclick="openGame('animals')">ANIMALES</button>

<button onclick="openGame('numbers')">NÚMEROS</button>

<button onclick="openGame('vowels')">VOCALES</button>

</div>

<div id="animals" class="screen">

<div class="stage"></div>

<div class="chickens"></div>

<div class="controls">

<button onclick="resetGame()">REINICIAR</button>

<button onclick="backMenu()">ATRÁS</button>

</div>

</div>

<div id="numbers" class="screen">

<div class="stage"></div>

<div class="chickens"></div>

<div class="controls">

<button onclick="resetGame()">REINICIAR</button>

<button onclick="backMenu()">ATRÁS</button>

</div>

</div>

<div id="vowels" class="screen">

<div class="stage"></div>

<div class="chickens"></div>

<div class="controls">

<button onclick="resetGame()">REINICIAR</button>

<button onclick="backMenu()">ATRÁS</button>

</div>

</div>

<script>

let currentGame=null;

let eggs=[];

let complete=0;

let SIZE=95;

let colors=[

"#E06A6A",
"#5FA0D3",
"#7CB77A",
"#F1CC4B",
"#F4AD42"

];

let sets={

animals:["🥚","🥚","🥚","🥚","🥚"],

numbers:["1","2","3","4","5"],

vowels:["A","E","I","O","U"]

};

function openGame(type){

document.getElementById("menu").style.display="none";

document.getElementById(type).style.display="block";

currentGame=type;

createGame(type);

}

function backMenu(){

document.getElementById(currentGame).style.display="none";

document.getElementById("menu").style.display="block";

}

function createGame(type){

let screen=document.getElementById(type);

let stage=screen.querySelector(".stage");

let targets=screen.querySelector(".chickens");

stage.innerHTML="";

targets.innerHTML="";

eggs=[];

complete=0;

sets[type].forEach((symbol,i)=>{

let t=document.createElement("div");

t.className="target";

t.style.background=colors[i];

t.innerText=symbol;

targets.appendChild(t);

for(let k=0;k<3;k++){

let placed=false;

let x;
let y;

while(!placed){

x=Math.random()*(stage.offsetWidth-SIZE);

y=Math.random()*(stage.offsetHeight);

placed=true;

for(let o of eggs){

let d=Math.hypot(x-o.x,y-o.y);

if(d<SIZE){

placed=false;

}

}

}

let el=document.createElement("div");

el.className="egg";

el.style.background=colors[i];

el.style.width=SIZE+"px";

el.style.height=(SIZE*1.2)+"px";

el.innerText=symbol;

stage.appendChild(el);

let egg={

el,

color:i,

x,

y,

locked:false

};

eggs.push(egg);

drag(egg,stage,targets);

}

});

}

function drag(e,stage,targets){

let ox;
let oy;

e.el.onpointerdown=ev=>{

if(e.locked)return;

let r=e.el.getBoundingClientRect();

ox=ev.clientX-r.left;

oy=ev.clientY-r.top;

e.drag=true;

e.el.setPointerCapture(ev.pointerId);

};

e.el.onpointermove=ev=>{

if(!e.drag)return;

let rect=stage.getBoundingClientRect();

e.x=ev.clientX-rect.left-ox;

e.y=ev.clientY-rect.top-oy;

};

e.el.onpointerup=ev=>{

e.drag=false;

e.el.releasePointerCapture(ev.pointerId);

check(e,targets);

};

}

function check(e,targets){

if(e.locked)return;

[...targets.children].forEach((t,i)=>{

let r=t.getBoundingClientRect();

let er=e.el.getBoundingClientRect();

let d=Math.hypot(

(r.left+r.width/2)-(er.left+er.width/2),

(r.top+r.height/2)-(er.top+er.height/2)

);

if(d<140 && e.color===i){

e.locked=true;

complete++;

e.el.style.opacity=0;

}

});

}

function resetGame(){

createGame(currentGame);

}

function render(){

eggs.forEach(e=>{

e.el.style.transform=

`translate(${e.x}px,${e.y}px)`;

});

requestAnimationFrame(render);

}

render();

</script>

</body>

</html>
