<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700&display=swap" rel="stylesheet">

<style>

body{

margin:0;

background:#C48A5A;

font-family:'Baloo 2';

}

/* SCREENS */

.screen{

width:100vw;

max-width:520px;

height:100vh;

margin:auto;

position:relative;

display:none;

background:#C48A5A;

}

/* MENU */

#menu{

display:block;

text-align:center;

}

.title{

background:#E8E2CC;

color:#6FB072;

width:85%;

margin:25px auto;

padding:15px;

border-radius:25px;

font-size:45px;

line-height:1;

}

.card{

background:#E8E2CC;

width:70%;

height:150px;

margin:20px auto;

border-radius:30px;

display:flex;

align-items:center;

justify-content:center;

font-size:90px;

cursor:pointer;

}

/* PLAY AREA */

.playarea{

background:#E8E2CC;

width:90%;

height:60%;

margin:auto;

border-radius:30px;

position:relative;

}

.stage{

position:absolute;

width:100%;

height:100%;

}

/* TARGETS */

.targets{

position:absolute;

bottom:-80px;

width:100%;

display:flex;

justify-content:space-around;

}

.target{

width:65px;

height:65px;

border-radius:50%;

display:flex;

align-items:center;

justify-content:center;

color:white;

font-size:30px;

}

/* EGGS */

.egg{

position:absolute;

border-radius:50%;

cursor:pointer;

display:flex;

align-items:center;

justify-content:center;

font-size:40px;

color:white;

font-weight:bold;

transition:.1s;

}

.egg:active{

transform:scale(1.1);

}

/* BUTTONS */

.controls{

position:absolute;

bottom:15px;

width:100%;

display:flex;

justify-content:center;

gap:20px;

}

button{

background:#E8E2CC;

color:#6FB072;

border:none;

padding:10px 25px;

font-size:24px;

border-radius:15px;

cursor:pointer;

font-weight:bold;

}

</style>

</head>

<body>

<!-- MENU -->

<div id="menu" class="screen">

<div class="title">

LA GRANJA<br>DE IAN

</div>

<div class="card" onclick="openGame('vowels')">

<span style="color:#E06A6A">A</span>

</div>

<div class="card" onclick="openGame('numbers')">

<span style="color:#5FA0D3">1</span>

</div>

<div class="card" onclick="openGame('animals')">

🐥

</div>

</div>

<!-- ANIMALS -->

<div id="animals" class="screen">

<div class="title">

LA GRANJA DE IAN

</div>

<div class="playarea">

<div class="stage"></div>

<div class="targets"></div>

</div>

<div class="controls">

<button onclick="backMenu()">ATRÁS</button>

<button onclick="resetGame()">REINICIAR</button>

</div>

</div>

<!-- NUMBERS -->

<div id="numbers" class="screen">

<div class="title">

LA GRANJA DE IAN

</div>

<div class="playarea">

<div class="stage"></div>

<div class="targets"></div>

</div>

<div class="controls">

<button onclick="backMenu()">ATRÁS</button>

<button onclick="resetGame()">REINICIAR</button>

</div>

</div>

<!-- VOWELS -->

<div id="vowels" class="screen">

<div class="title">

LA GRANJA DE IAN

</div>

<div class="playarea">

<div class="stage"></div>

<div class="targets"></div>

</div>

<div class="controls">

<button onclick="backMenu()">ATRÁS</button>

<button onclick="resetGame()">REINICIAR</button>

</div>

</div>

<script>

let currentGame;

let eggs=[];

let SIZE=90;

let colors=[

"#E06A6A",
"#5FA0D3",
"#7CB77A",
"#F1CC4B",
"#F4AD42"

];

let sets={

animals:["","","","",""],

numbers:["1","2","3","4","5"],

vowels:["A","E","I","O","U"]

};

function openGame(type){

document.getElementById("menu").style.display="none";

document.getElementById(type).style.display="block";

currentGame=type;

createGame(type);

}

function backMenu(){

document.getElementById(currentGame).style.display="none";

document.getElementById("menu").style.display="block";

}

function createGame(type){

let screen=document.getElementById(type);

let stage=screen.querySelector(".stage");

let targets=screen.querySelector(".targets");

stage.innerHTML="";

targets.innerHTML="";

eggs=[];

sets[type].forEach((symbol,i)=>{

let t=document.createElement("div");

t.className="target";

t.style.background=colors[i];

t.innerText=symbol;

targets.appendChild(t);

for(let k=0;k<3;k++){

let placed=false;

let x;
let y;

while(!placed){

x=Math.random()*(stage.offsetWidth-SIZE);

y=Math.random()*(stage.offsetHeight-SIZE);

placed=true;

for(let o of eggs){

let d=Math.hypot(x-o.x,y-o.y);

if(d<SIZE){

placed=false;

}

}

}

let el=document.createElement("div");

el.className="egg";

el.style.background=colors[i];

el.style.width=SIZE+"px";

el.style.height=(SIZE*1.2)+"px";

el.innerText=symbol;

stage.appendChild(el);

let egg={

el,

color:i,

x,

y,

locked:false

};

eggs.push(egg);

drag(egg,stage,targets);

}

});

}

function drag(e,stage,targets){

let ox;
let oy;

e.el.onpointerdown=ev=>{

if(e.locked)return;

let r=e.el.getBoundingClientRect();

ox=ev.clientX-r.left;

oy=ev.clientY-r.top;

e.drag=true;

e.el.setPointerCapture(ev.pointerId);

};

e.el.onpointermove=ev=>{

if(!e.drag)return;

let rect=stage.getBoundingClientRect();

e.x=ev.clientX-rect.left-ox;

e.y=ev.clientY-rect.top-oy;

};

e.el.onpointerup=ev=>{

e.drag=false;

e.el.releasePointerCapture(ev.pointerId);

check(e,targets);

};

}

function check(e,targets){

if(e.locked)return;

[...targets.children].forEach((t,i)=>{

let r=t.getBoundingClientRect();

let er=e.el.getBoundingClientRect();

let d=Math.hypot(

(r.left+r.width/2)-(er.left+er.width/2),

(r.top+r.height/2)-(er.top+er.height/2)

);

if(d<120 && e.color===i){

e.locked=true;

e.el.style.opacity=0;

}

});

}

function resetGame(){

createGame(currentGame);

}

function render(){

eggs.forEach(e=>{

e.el.style.transform=

`translate(${e.x}px,${e.y}px)`;

});

requestAnimationFrame(render);

}

render();

</script>

</body>

</html>
