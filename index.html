<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600&display=swap" rel="stylesheet">

<style>

body{

margin:0;
background:#EAF4E6;
display:flex;
justify-content:center;
font-family:'Baloo 2';
overflow:hidden;

}

.game{

width:100vw;
max-width:520px;
height:100vh;

position:relative;

background:linear-gradient(#F3FAF0,#EAF4E6);

overflow:hidden;

}

.title{

text-align:center;

margin-top:15px;

color:#5C8F72;

line-height:1;

}

.top{

font-size:clamp(30px,6vw,46px);

}

.bottom{

font-size:clamp(40px,7vw,56px);

}

.stage{

position:absolute;

top:110px;

height:50%;

width:100%;

}

.egg{

position:absolute;

width:clamp(32px,7vw,42px);

height:clamp(42px,8vw,52px);

border-radius:50% 50% 45% 45%;

cursor:pointer;

animation:breath 2.4s ease infinite;

will-change:transform;

}

@keyframes breath{

0%{transform:scale(1)}

50%{transform:scale(1.06)}

100%{transform:scale(1)}

}

.chickens{

position:absolute;

bottom:20px;

width:100%;

display:flex;

justify-content:space-around;

}

.chicken{

width:70px;

height:90px;

position:relative;

transition:.35s;

}

.happy{

animation:happy .5s;

}

@keyframes happy{

0%{transform:scale(1)}

50%{

transform:scale(1.25)
rotate(6deg)

}

100%{transform:scale(1)}

}

.nest{

position:absolute;

width:65px;

height:22px;

border-radius:50%;

bottom:75px;

opacity:.25;

filter:blur(2px);

}

.body{

width:60px;
height:60px;

border-radius:50%;

position:absolute;

}

.wing{

width:25px;
height:30px;

border-radius:50%;

position:absolute;

top:18px;

opacity:.9;

}

.left{left:-6px;}
.right{right:-6px;}

.eye{

width:12px;
height:12px;

background:white;

border-radius:50%;

position:absolute;

top:15px;

display:flex;

justify-content:center;

align-items:center;

}

.eye.left{left:14px;}
.eye.right{right:14px;}

.pupil{

width:6px;
height:6px;

background:#E65100;

border-radius:50%;

}

.beak{

width:0;
height:0;

border-left:8px solid transparent;
border-right:8px solid transparent;

border-top:12px solid #F4511E;

position:absolute;

top:32px;

}

.feet{

position:absolute;

bottom:-5px;

width:100%;

display:flex;

justify-content:space-around;

}

.foot{

width:14px;
height:5px;

background:#F4511E;

border-radius:10px;

}

.win{

position:absolute;

top:45%;

width:100%;

text-align:center;

font-size:70px;

opacity:0;

transition:.6s;

pointer-events:none;

}

</style>

</head>

<body>

<div class="game">

<div class="title">

<div class="top">LA GRANJA</div>

<div class="bottom">DE IAN</div>

</div>

<div class="stage" id="stage"></div>

<div class="win" id="win">

🎉👏🎉

</div>

<div class="chickens">

<div class="chicken">

<div class="nest" style="background:#E57373"></div>

<div class="body" style="background:#E57373"></div>

<div class="wing left" style="background:#E57373"></div>

<div class="wing right" style="background:#E57373"></div>

<div class="eye left"><div class="pupil"></div></div>

<div class="eye right"><div class="pupil"></div></div>

<div class="beak"></div>

<div class="feet">

<div class="foot"></div>

<div class="foot"></div>

</div>

</div>

<div class="chicken">

<div class="nest" style="background:#64B5F6"></div>

<div class="body" style="background:#64B5F6"></div>

<div class="wing left" style="background:#64B5F6"></div>

<div class="wing right" style="background:#64B5F6"></div>

<div class="eye left"><div class="pupil"></div></div>

<div class="eye right"><div class="pupil"></div></div>

<div class="beak"></div>

<div class="feet">

<div class="foot"></div>

<div class="foot"></div>

</div>

</div>

<div class="chicken">

<div class="nest" style="background:#81C784"></div>

<div class="body" style="background:#81C784"></div>

<div class="wing left" style="background:#81C784"></div>

<div class="wing right" style="background:#81C784"></div>

<div class="eye left"><div class="pupil"></div></div>

<div class="eye right"><div class="pupil"></div></div>

<div class="beak"></div>

<div class="feet">

<div class="foot"></div>

<div class="foot"></div>

</div>

</div>

<div class="chicken">

<div class="nest" style="background:#FFD54F"></div>

<div class="body" style="background:#FFD54F"></div>

<div class="wing left" style="background:#FFD54F"></div>

<div class="wing right" style="background:#FFD54F"></div>

<div class="eye left"><div class="pupil"></div></div>

<div class="eye right"><div class="pupil"></div></div>

<div class="beak"></div>

<div class="feet">

<div class="foot"></div>

<div class="foot"></div>

</div>

</div>

<div class="chicken">

<div class="nest" style="background:#FFB74D"></div>

<div class="body" style="background:#FFB74D"></div>

<div class="wing left" style="background:#FFB74D"></div>

<div class="wing right" style="background:#FFB74D"></div>

<div class="eye left"><div class="pupil"></div></div>

<div class="eye right"><div class="pupil"></div></div>

<div class="beak"></div>

<div class="feet">

<div class="foot"></div>

<div class="foot"></div>

</div>

</div>

</div>

</div>

<script>

const pop=new Audio("https://assets.mixkit.co/sfx/preview/mixkit-bubble-pop-1993.mp3");

const stage=document.getElementById("stage");

const win=document.getElementById("win");

const chickens=document.querySelectorAll(".chicken");

const colors=[

"#E57373",
"#64B5F6",
"#81C784",
"#FFD54F",
"#FFB74D"

];

const eggs=[];

let complete=0;

/* size */

function size(){

return{

w:stage.clientWidth-40,
h:stage.clientHeight-40

};

}

/* create eggs */

colors.forEach((color,c)=>{

for(let i=0;i<5;i++){

let s=size();

let el=document.createElement("div");

el.className="egg";

el.style.background=color;

stage.appendChild(el);

eggs.push({

el,
color:c,

x:Math.random()*s.w,
y:Math.random()*s.h,

vx:(Math.random()-.5)*.25,
vy:(Math.random()-.5)*.25,

drag:false,
locked:false

});

}

});

/* drag */

eggs.forEach(e=>{

let ox;
let oy;

e.el.onpointerdown=ev=>{

if(e.locked)return;

e.drag=true;

let r=e.el.getBoundingClientRect();

ox=ev.clientX-r.left;

oy=ev.clientY-r.top;

};

e.el.onpointermove=ev=>{

if(!e.drag)return;

let r=stage.getBoundingClientRect();

e.x=ev.clientX-r.left-ox;

e.y=ev.clientY-r.top-oy;

};

e.el.onpointerup=()=>{

e.drag=false;

snap(e);

};

});

/* snap */

function snap(e){

chickens.forEach((chicken,i)=>{

let r=chicken.getBoundingClientRect();

let er=e.el.getBoundingClientRect();

let cx=r.left+r.width/2;

let cy=r.top+r.height/2;

let ex=er.left+er.width/2;

let ey=er.top+er.height/2;

let d=Math.hypot(cx-ex,cy-ey);

/* magnetic attraction */

if(d<140 && !e.locked){

e.vx+=(cx-ex)*.0015;

e.vy+=(cy-ey)*.0015;

}

/* correct drop */

if(d<70){

if(e.color===i){

e.locked=true;

complete++;

e.el.style.transform="scale(.2)";

e.el.style.opacity=0;

chicken.classList.add("happy");

setTimeout(()=>{

chicken.classList.remove("happy");

},400);

pop.currentTime=0;

pop.play();

if(navigator.vibrate){

navigator.vibrate(60);

}

if(complete===25){

win.style.opacity=1;

}

}

}

});

}

/* physics */

function physics(){

let s=size();

for(let e of eggs){

if(e.drag || e.locked)continue;

e.vx+=(Math.random()-.5)*.012;

e.vy+=(Math.random()-.5)*.012;

e.vx*=.985;

e.vy*=.985;

let max=.32;

e.vx=Math.max(-max,Math.min(max,e.vx));

e.vy=Math.max(-max,Math.min(max,e.vy));

e.x+=e.vx;

e.y+=e.vy;

if(e.x<0)e.x=0;

if(e.x>s.w)e.x=s.w;

if(e.y<0)e.y=0;

if(e.y>s.h)e.y=s.h;

}

/* separation */

for(let i=0;i<eggs.length;i++){

for(let j=i+1;j<eggs.length;j++){

let a=eggs[i];

let b=eggs[j];

if(a.locked||b.locked)continue;

let dx=b.x-a.x;

let dy=b.y-a.y;

let dist=Math.hypot(dx,dy);

if(dist<36){

let f=.04;

let nx=dx/dist;

let ny=dy/dist;

a.x-=nx*f;

a.y-=ny*f;

b.x+=nx*f;

b.y+=ny*f;

}

}

}

}

/* render */

function render(){

physics();

eggs.forEach(e=>{

e.el.style.transform=

`translate(${e.x}px,${e.y}px)`;

});

requestAnimationFrame(render);

}

render();

</script>

</body>

</html>
