<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600&display=swap" rel="stylesheet">

<style>

body{

margin:0;
background:#F2F8EF;
display:flex;
justify-content:center;
font-family:'Baloo 2';
overflow:hidden;

}

.game{

width:100vw;
max-width:520px;
height:100vh;

position:relative;

background:#F2F8EF;

overflow:hidden;

}

.title{

text-align:center;

margin-top:15px;

color:#6FA88F;

}

.top{

font-size:clamp(30px,6vw,45px);

}

.bottom{

font-size:clamp(40px,7vw,55px);

}

.stage{

position:absolute;

top:110px;

height:52%;

width:100%;

}

/* EGGS */

.egg{

position:absolute;

border-radius:50% 50% 45% 45%;

cursor:pointer;

touch-action:none;

transition:transform .15s;

}

/* CHICKENS */

.chickens{

position:absolute;

bottom:20px;

width:100%;

display:flex;

justify-content:space-around;

}

.chicken{

width:65px;

height:85px;

position:relative;

}

.body{

width:60px;
height:60px;

border-radius:50%;

position:absolute;

}

.eye{

width:12px;
height:12px;

background:white;

border-radius:50%;

position:absolute;

top:18px;

}

.eye.left{

left:14px;

}

.eye.right{

right:14px;

}

.pupil{

width:6px;
height:6px;

background:#E65100;

border-radius:50%;

margin:3px;

}

.beak{

width:0;

height:0;

border-left:8px solid transparent;
border-right:8px solid transparent;

border-top:12px solid #F4511E;

position:absolute;

top:35px;

left:22px;

}

.win{

position:absolute;

top:45%;

width:100%;

text-align:center;

font-size:70px;

opacity:0;

transition:.5s;

}

</style>

</head>

<body>

<div class="game">

<div class="title">

<div class="top">LA GRANJA</div>

<div class="bottom">DE IAN</div>

</div>

<div class="stage" id="stage"></div>

<div class="win" id="win">

🎉🎉🎉

</div>

<div class="chickens">

<div class="chicken">
<div class="body" style="background:#E57373"></div>
<div class="eye left"><div class="pupil"></div></div>
<div class="eye right"><div class="pupil"></div></div>
<div class="beak"></div>
</div>

<div class="chicken">
<div class="body" style="background:#64B5F6"></div>
<div class="eye left"><div class="pupil"></div></div>
<div class="eye right"><div class="pupil"></div></div>
<div class="beak"></div>
</div>

<div class="chicken">
<div class="body" style="background:#81C784"></div>
<div class="eye left"><div class="pupil"></div></div>
<div class="eye right"><div class="pupil"></div></div>
<div class="beak"></div>
</div>

<div class="chicken">
<div class="body" style="background:#FFD54F"></div>
<div class="eye left"><div class="pupil"></div></div>
<div class="eye right"><div class="pupil"></div></div>
<div class="beak"></div>
</div>

<div class="chicken">
<div class="body" style="background:#FFB74D"></div>
<div class="eye left"><div class="pupil"></div></div>
<div class="eye right"><div class="pupil"></div></div>
<div class="beak"></div>
</div>

</div>

</div>

<script>

const stage=document.getElementById("stage");

const win=document.getElementById("win");

const chickens=document.querySelectorAll(".chicken");

const colors=[

"#E57373",
"#64B5F6",
"#81C784",
"#FFD54F",
"#FFB74D"

];

const eggs=[];

let complete=0;

let z=1;

/* STAGE SIZE */

function stageSize(){

return{

w:stage.clientWidth,
h:stage.clientHeight

};

}

/* CREATE EGGS */

colors.forEach((color,index)=>{

for(let i=0;i<5;i++){

let size=30+Math.random()*12;

let egg=document.createElement("div");

egg.className="egg";

egg.style.background=color;

egg.style.width=size+"px";

egg.style.height=(size+8)+"px";

stage.appendChild(egg);

let s=stageSize();

eggs.push({

el:egg,

color:index,

x:Math.random()*(s.w-size),

y:Math.random()*(s.h-size),

vx:(Math.random()-.5)*0.3,

vy:(Math.random()-.5)*0.3,

size:size,

drag:false,

locked:false

});

}

});

/* DRAG */

eggs.forEach(e=>{

let ox;

let oy;

e.el.onpointerdown=ev=>{

if(e.locked)return;

e.drag=true;

z++;

e.el.style.zIndex=z;

let r=e.el.getBoundingClientRect();

ox=ev.clientX-r.left;

oy=ev.clientY-r.top;

};

e.el.onpointermove=ev=>{

if(!e.drag)return;

let rect=stage.getBoundingClientRect();

e.x=ev.clientX-rect.left-ox;

e.y=ev.clientY-rect.top-oy;

};

e.el.onpointerup=()=>{

e.drag=false;

check(e);

};

});

/* CHECK DROP */

function check(e){

chickens.forEach((chicken,i)=>{

let r=chicken.getBoundingClientRect();

let er=e.el.getBoundingClientRect();

let cx=r.left+r.width/2;

let cy=r.top+r.height/2;

let ex=er.left+er.width/2;

let ey=er.top+er.height/2;

let d=Math.hypot(cx-ex,cy-ey);

if(d<80){

if(e.color===i){

e.locked=true;

complete++;

e.el.style.opacity=0;

e.el.style.transform="scale(.2)";

if(complete===25){

win.style.opacity=1;

}

}

}

});

}

/* PHYSICS */

function physics(){

let s=stageSize();

for(let e of eggs){

if(e.drag || e.locked)continue;

e.vx+=(Math.random()-.5)*0.01;

e.vy+=(Math.random()-.5)*0.01;

e.vx*=0.99;

e.vy*=0.99;

let max=0.25;

e.vx=Math.max(-max,Math.min(max,e.vx));

e.vy=Math.max(-max,Math.min(max,e.vy));

e.x+=e.vx;

e.y+=e.vy;

/* BOUNDS */

if(e.x<0)e.x=0;

if(e.x>s.w-e.size)e.x=s.w-e.size;

if(e.y<0)e.y=0;

if(e.y>s.h-e.size)e.y=s.h-e.size;

}

}

/* RENDER */

function render(){

physics();

eggs.forEach(e=>{

e.el.style.transform=

`translate(${e.x}px,${e.y}px)`;

});

requestAnimationFrame(render);

}

render();

</script>

</body>

</html>
