<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600&display=swap" rel="stylesheet">

<style>

body{

margin:0;

background:#C48A5A;

display:flex;

justify-content:center;

font-family:'Baloo 2';

}

.game{

width:100vw;

max-width:520px;

height:100vh;

background:#E8E2CC;

border-radius:30px;

position:relative;

overflow:hidden;

}

.title{

text-align:center;

color:#6FB072;

padding:20px;

font-size:clamp(35px,6vw,55px);

}

.stage{

position:absolute;

top:120px;

height:55%;

width:100%;

}

.egg{

position:absolute;

border-radius:50%;

cursor:pointer;

touch-action:none;

transition:.12s;

overflow:hidden;

}

.egg:active{

transform:scale(1.1);

}

.egg::before{

content:"";

position:absolute;

width:100%;

height:100%;

border-radius:50%;

background:linear-gradient(

to bottom,

rgba(255,255,255,.3),

rgba(0,0,0,.1)

);

opacity:.3;

}

.egg::after{

content:"";

position:absolute;

width:45%;

height:45%;

left:18%;

top:12%;

border-radius:50%;

background:rgba(255,255,255,.35);

}

.chickens{

position:absolute;

bottom:70px;

width:100%;

display:flex;

justify-content:space-around;

}

.chicken{

width:70px;

height:70px;

position:relative;

}

.body{

width:65px;
height:65px;

border-radius:50%;

position:absolute;

}

.eye{

width:14px;
height:14px;

background:white;

border-radius:50%;

position:absolute;

top:18px;

}

.eye.left{left:14px;}

.eye.right{right:14px;}

.pupil{

width:8px;
height:8px;

background:#6B3E00;

border-radius:50%;

margin:3px;

}

.beak{

width:0;

height:0;

border-left:10px solid transparent;
border-right:10px solid transparent;

border-top:18px solid #FF8A00;

position:absolute;

top:32px;

left:22px;

}

.win{

position:absolute;

top:45%;

width:100%;

text-align:center;

font-size:70px;

opacity:0;

transition:.5s;

}

#restart{

position:absolute;

bottom:10px;

left:50%;

transform:translateX(-50%);

background:#6FB072;

color:white;

border:none;

padding:12px 25px;

font-size:20px;

border-radius:15px;

display:none;

cursor:pointer;

}

canvas{

position:absolute;

top:0;

left:0;

pointer-events:none;

}

</style>

</head>

<body>

<div class="game">

<div class="title">

LA GRANJA<br>DE IAN

</div>

<div class="stage" id="stage"></div>

<div class="win" id="win">

🎉👏🎉

</div>

<canvas id="confetti"></canvas>

<div class="chickens">

<div class="chicken"><div class="body" style="background:#E06A6A"></div><div class="eye left"><div class="pupil"></div></div><div class="eye right"><div class="pupil"></div></div><div class="beak"></div></div>

<div class="chicken"><div class="body" style="background:#5FA0D3"></div><div class="eye left"><div class="pupil"></div></div><div class="eye right"><div class="pupil"></div></div><div class="beak"></div></div>

<div class="chicken"><div class="body" style="background:#7CB77A"></div><div class="eye left"><div class="pupil"></div></div><div class="eye right"><div class="pupil"></div></div><div class="beak"></div></div>

<div class="chicken"><div class="body" style="background:#F1CC4B"></div><div class="eye left"><div class="pupil"></div></div><div class="eye right"><div class="pupil"></div></div><div class="beak"></div></div>

<div class="chicken"><div class="body" style="background:#F4AD42"></div><div class="eye left"><div class="pupil"></div></div><div class="eye right"><div class="pupil"></div></div><div class="beak"></div></div>

</div>

<button id="restart">REINICIAR</button>

</div>

<script>

window.onload=()=>{

const stage=document.getElementById("stage");

const win=document.getElementById("win");

const restart=document.getElementById("restart");

const chickens=document.querySelectorAll(".chicken");

const canvas=document.getElementById("confetti");

const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;

canvas.height=window.innerHeight;

const colors=[

"#E06A6A",
"#5FA0D3",
"#7CB77A",
"#F1CC4B",
"#F4AD42"

];

const eggs=[];

let complete=0;

let z=1;

const SIZE=95;

/* spawn */

colors.forEach((color,c)=>{

for(let i=0;i<3;i++){

let placed=false;

let x;
let y;

while(!placed){

let w=stage.offsetWidth-SIZE;

let h=stage.offsetHeight;

x=Math.random()*w;

y=Math.random()*h;

placed=true;

for(let other of eggs){

let dx=x-other.x;

let dy=y-other.y;

let dist=Math.hypot(dx,dy);

if(dist<SIZE){

placed=false;

}

}

}

let el=document.createElement("div");

el.className="egg";

el.style.background=color;

el.style.width=SIZE+"px";

el.style.height=(SIZE*1.2)+"px";

stage.appendChild(el);

eggs.push({

el,

color:c,

x,

y,

locked:false

});

}

});

/* drag */

eggs.forEach(e=>{

let ox;
let oy;

e.el.onpointerdown=ev=>{

if(e.locked)return;

z++;

e.el.style.zIndex=z;

e.el.setPointerCapture(ev.pointerId);

let r=e.el.getBoundingClientRect();

ox=ev.clientX-r.left;

oy=ev.clientY-r.top;

e.drag=true;

};

e.el.onpointermove=ev=>{

if(!e.drag)return;

let rect=stage.getBoundingClientRect();

e.x=ev.clientX-rect.left-ox;

e.y=ev.clientY-rect.top-oy;

};

e.el.onpointerup=ev=>{

e.drag=false;

e.el.releasePointerCapture(ev.pointerId);

check(e);

};

});

/* confetti */

let particles=[];

function confetti(){

for(let i=0;i<150;i++){

particles.push({

x:Math.random()*canvas.width,

y:-20,

size:6,

speed:2+Math.random()*2,

color:colors[Math.floor(Math.random()*5)]

});

}

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

ctx.fillStyle=p.color;

ctx.fillRect(p.x,p.y,p.size,p.size);

p.y+=p.speed;

});

requestAnimationFrame(draw);

}

/* drop */

function check(e){

if(e.locked)return;

chickens.forEach((chicken,i)=>{

let r=chicken.getBoundingClientRect();

let er=e.el.getBoundingClientRect();

let cx=r.left+r.width/2;

let cy=r.top+r.height/2;

let ex=er.left+er.width/2;

let ey=er.top+er.height/2;

let d=Math.hypot(cx-ex,cy-ey);

if(d<140 && e.color===i){

e.locked=true;

complete++;

e.el.style.opacity=0;

if(complete===15){

win.style.opacity=1;

confetti();

draw();

restart.style.display="block";

}

}

});

}

/* restart */

restart.onclick=()=>{

location.reload();

}

/* render */

function render(){

eggs.forEach(e=>{

e.el.style.transform=

`translate(${e.x}px,${e.y}px)`;

});

requestAnimationFrame(render);

}

render();

}

</script>

</body>

</html>
