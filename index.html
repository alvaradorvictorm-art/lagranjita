<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600&display=swap" rel="stylesheet">

<style>

body{

margin:0;
background:#C48A5A;
display:flex;
justify-content:center;
font-family:'Baloo 2';
overflow:hidden;

}

.game{

width:100vw;
max-width:520px;
height:100vh;

position:relative;

background:#E8E2CC;

border-radius:30px;

overflow:hidden;

margin-top:10px;

}

.title{

text-align:center;

color:#6FB072;

padding:20px;

font-size:clamp(35px,6vw,55px);

}

.stage{

position:absolute;

top:120px;

height:60%;

width:100%;

}

.egg{

position:absolute;

border-radius:50%;

touch-action:none;

cursor:pointer;

animation:pop .4s ease;

}

@keyframes pop{

0%{transform:scale(.6)}

60%{transform:scale(1.1)}

100%{transform:scale(1)}

}

.chickens{

position:absolute;

bottom:20px;

width:100%;

display:flex;

justify-content:space-around;

}

.chicken{

width:70px;

height:70px;

position:relative;

}

.body{

width:65px;
height:65px;

border-radius:50%;

position:absolute;

}

.eye{

width:14px;
height:14px;

background:white;

border-radius:50%;

position:absolute;

top:18px;

}

.eye.left{

left:14px;

}

.eye.right{

right:14px;

}

.pupil{

width:8px;
height:8px;

background:#6B3E00;

border-radius:50%;

margin:3px;

}

.beak{

width:0;

height:0;

border-left:10px solid transparent;
border-right:10px solid transparent;

border-top:18px solid #FF8A00;

position:absolute;

top:32px;

left:22px;

}

.win{

position:absolute;

top:45%;

width:100%;

text-align:center;

font-size:70px;

opacity:0;

transition:.5s;

}

</style>

</head>
