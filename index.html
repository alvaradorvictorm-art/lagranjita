<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600&display=swap" rel="stylesheet">

<style>

body{

margin:0;
background:#C48A5A;
display:flex;
justify-content:center;
font-family:'Baloo 2';
overflow:hidden;

}

.game{

width:100vw;
max-width:520px;
height:100vh;

position:relative;

background:#E8E2CC;

border-radius:30px;

overflow:hidden;

margin-top:10px;

}

.title{

text-align:center;

color:#6FB072;

padding:20px;

font-size:clamp(35px,6vw,55px);

}

.stage{

position:absolute;

top:120px;

height:60%;

width:100%;

}

.egg{

position:absolute;

border-radius:50%;

touch-action:none;

transition:.15s;

}

.chickens{

position:absolute;

bottom:20px;

width:100%;

display:flex;

justify-content:space-around;

}

.chicken{

width:70px;

height:70px;

position:relative;

}

.body{

width:65px;
height:65px;

border-radius:50%;

position:absolute;

}

.eye{

width:14px;
height:14px;

background:white;

border-radius:50%;

position:absolute;

top:18px;

}

.eye.left{

left:14px;

}

.eye.right{

right:14px;

}

.pupil{

width:8px;
height:8px;

background:#6B3E00;

border-radius:50%;

margin:3px;

}

.beak{

width:0;

height:0;

border-left:10px solid transparent;
border-right:10px solid transparent;

border-top:18px solid #FF8A00;

position:absolute;

top:32px;

left:22px;

}

.win{

position:absolute;

top:45%;

width:100%;

text-align:center;

font-size:70px;

opacity:0;

transition:.5s;

}

</style>

</head>

<body>

<div class="game">

<div class="title">

LA GRANJA<br>DE IAN

</div>

<div class="stage" id="stage"></div>

<div class="win" id="win">

🎉👏🎉

</div>

<div class="chickens">

<div class="chicken">
<div class="body" style="background:#E06A6A"></div>
<div class="eye left"><div class="pupil"></div></div>
<div class="eye right"><div class="pupil"></div></div>
<div class="beak"></div>
</div>

<div class="chicken">
<div class="body" style="background:#5FA0D3"></div>
<div class="eye left"><div class="pupil"></div></div>
<div class="eye right"><div class="pupil"></div></div>
<div class="beak"></div>
</div>

<div class="chicken">
<div class="body" style="background:#7CB77A"></div>
<div class="eye left"><div class="pupil"></div></div>
<div class="eye right"><div class="pupil"></div></div>
<div class="beak"></div>
</div>

<div class="chicken">
<div class="body" style="background:#F1CC4B"></div>
<div class="eye left"><div class="pupil"></div></div>
<div class="eye right"><div class="pupil"></div></div>
<div class="beak"></div>
</div>

<div class="chicken">
<div class="body" style="background:#F4AD42"></div>
<div class="eye left"><div class="pupil"></div></div>
<div class="eye right"><div class="pupil"></div></div>
<div class="beak"></div>
</div>

</div>

</div>

<script>

const stage=document.getElementById("stage");

const win=document.getElementById("win");

const chickens=document.querySelectorAll(".chicken");

const colors=[

"#E06A6A",
"#5FA0D3",
"#7CB77A",
"#F1CC4B",
"#F4AD42"

];

const sizes=[28,34,40,46,52];

const eggs=[];

let complete=0;

let z=1;

function stageSize(){

return{

w:stage.clientWidth,
h:stage.clientHeight

};

}

/* SPAWN WITHOUT OVERLAP */

colors.forEach((color,c)=>{

for(let i=0;i<5;i++){

let size=sizes[i];

let placed=false;

let x;
let y;

let tries=0;

while(!placed && tries<200){

let s=stageSize();

x=Math.random()*(s.w-size);

y=Math.random()*(s.h-size);

placed=true;

for(let other of eggs){

let dx=x-other.x;

let dy=y-other.y;

let dist=Math.hypot(dx,dy);

let min=(size+other.size)*.6;

if(dist<min){

placed=false;

}

}

tries++;

}

let el=document.createElement("div");

el.className="egg";

el.style.background=color;

el.style.width=size+"px";

el.style.height=(size*1.25)+"px";

stage.appendChild(el);

eggs.push({

el,

color:c,

x,

y,

size,

vx:(Math.random()-.5)*.15,

vy:(Math.random()-.5)*.15,

drag:false,

locked:false

});

}

});

/* DRAG */

eggs.forEach(e=>{

let ox;

let oy;

e.el.onpointerdown=ev=>{

if(e.locked)return;

e.drag=true;

z++;

e.el.style.zIndex=z;

let r=e.el.getBoundingClientRect();

ox=ev.clientX-r.left;

oy=ev.clientY-r.top;

};

e.el.onpointermove=ev=>{

if(!e.drag)return;

let rect=stage.getBoundingClientRect();

e.x=ev.clientX-rect.left-ox;

e.y=ev.clientY-rect.top-oy;

};

e.el.onpointerup=()=>{

e.drag=false;

check(e);

};

});

/* CHECK */

function check(e){

chickens.forEach((chicken,i)=>{

let r=chicken.getBoundingClientRect();

let er=e.el.getBoundingClientRect();

let cx=r.left+r.width/2;

let cy=r.top+r.height/2;

let ex=er.left+er.width/2;

let ey=er.top+er.height/2;

let d=Math.hypot(cx-ex,cy-ey);

if(d<80){

if(e.color===i){

e.locked=true;

complete++;

e.el.style.opacity=0;

if(complete===25){

win.style.opacity=1;

}

}

}

});

}

/* PHYSICS */

function physics(){

let s=stageSize();

for(let e of eggs){

if(e.drag || e.locked)continue;

e.vx+=(Math.random()-.5)*0.004;

e.vy+=(Math.random()-.5)*0.004;

e.vx*=0.995;

e.vy*=0.995;

let max=.12;

e.vx=Math.max(-max,Math.min(max,e.vx));

e.vy=Math.max(-max,Math.min(max,e.vy));

e.x+=e.vx;

e.y+=e.vy;

/* BOUNDS */

if(e.x<0)e.x=0;

if(e.x>s.w-e.size)e.x=s.w-e.size;

if(e.y<0)e.y=0;

if(e.y>s.h-e.size)e.y=s.h-e.size;

}

/* SOLID COLLISION */

for(let i=0;i<eggs.length;i++){

for(let j=i+1;j<eggs.length;j++){

let a=eggs[i];

let b=eggs[j];

if(a.locked||b.locked)continue;

let dx=b.x-a.x;

let dy=b.y-a.y;

let dist=Math.hypot(dx,dy);

let min=(a.size+b.size)*.5;

if(dist<min){

let push=(min-dist)*.15;

let nx=dx/dist;

let ny=dy/dist;

a.x-=nx*push;

a.y-=ny*push;

b.x+=nx*push;

b.y+=ny*push;

}

}

}

}

/* RENDER */

function render(){

physics();

eggs.forEach(e=>{

e.el.style.transform=

`translate(${e.x}px,${e.y}px)`;

});

requestAnimationFrame(render);

}

render();

</script>

</body>

</html>
